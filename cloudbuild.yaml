# vuln-hawk image build + push.
#
# Default registry: us-docker.pkg.dev/$PROJECT_ID/default/mvpzone/vuln-hawk
# (us multi-region "default" repo; "mvpzone/vuln-hawk" path mirrors the
# pyful-agents "pycloud/pyful-agents" convention.)
#
# Override via substitutions to retarget the build:
#   gcloud builds submit \
#     --substitutions=_AR_LOCATION=us-east1,_AR_REPO=staging,_PATH_PREFIX=other/path \
#     ...

steps:
- name: gcr.io/cloud-builders/docker
  id: build
  args:
    - build
    - --platform=linux/amd64
    - -t
    - ${_AR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_PATH_PREFIX}/${_IMAGE_NAME}:${SHORT_SHA}
    - -t
    - ${_AR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_PATH_PREFIX}/${_IMAGE_NAME}:latest
    - .

- name: gcr.io/cloud-builders/docker
  id: push-sha
  args:
    - push
    - ${_AR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_PATH_PREFIX}/${_IMAGE_NAME}:${SHORT_SHA}

- name: gcr.io/cloud-builders/docker
  id: push-latest
  args:
    - push
    - ${_AR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_PATH_PREFIX}/${_IMAGE_NAME}:latest

substitutions:
  _AR_LOCATION: us
  _AR_REPO: default
  _PATH_PREFIX: mvpzone/vuln-hawk
  _IMAGE_NAME: vuln-hawk

images:
  - ${_AR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_PATH_PREFIX}/${_IMAGE_NAME}:${SHORT_SHA}
  - ${_AR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_PATH_PREFIX}/${_IMAGE_NAME}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s
